# Insta_Ali_Translate — n8n + redis + web + worker + nginx
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  web:
    build: .
    command: uvicorn web.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./assets:/app/assets
      - ./db:/app/db
      - ./.env:/app/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      SUBTITLE_FONT_PATH: /usr/share/fonts/truetype/nanum/NanumGothicBold.ttf
      SHOWCASE_BASE_URL: http://localhost:8080
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: python worker/run_worker.py
    volumes:
      - ./assets:/app/assets
      - ./db:/app/db
      - ./.env:/app/.env
    environment:
      REDIS_URL: redis://redis:6379/0
      SUBTITLE_FONT_PATH: /usr/share/fonts/truetype/nanum/NanumGothicBold.ttf
      SHOWCASE_BASE_URL: http://localhost:8080
    depends_on:
      - redis
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Seoul
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change-me-32-characters-minimum!!}
    volumes:
      - ./n8n_data:/home/node/.n8n
      - ./n8n/workflows:/import:ro
    depends_on:
      - web
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./assets:/var/www/assets:ro
    depends_on:
      - web
    restart: unless-stopped
